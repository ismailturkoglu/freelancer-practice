<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <!-- main css -->
    <link rel="stylesheet" href="../css/main.css">
    <title>About</title>
</head>

<body>
    <!-- header--small -->
    <header class="header--small">
        <div class="container">
            <!-- main-nav -->
            <nav class="main-nav">
                <a href="../index.html">
                    <img class="main-nav__logo" src="../img/logo.png" alt="">
                </a>
                <ul class="main-nav__items">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- section-a -->
    <section id="contact__form" class="text-center py-3 my-4">
        <div class="container">
            <h2 class="section-title">Contact Me</h2>
            <div class="border-bottom"></div>
            <p class="lead">Lorem ipsum dolor sit.</p>
            <form>
                <div class="form-fields">
                    <input type="text" name="full-name" id="full-name" placeholder="Name">
                    <input type="email" name="email" id="email" placeholder="Email">
                    <input type="text" name="subject" id="subject" placeholder="Subject">
                    <input type="tel" name="phone" id="phone" placeholder="Phone (05xx xxx xx xx)" maxlength="14">
                    <textarea name="message" id="message" placeholder="Message"></textarea>
                    <button type="submit" id="submit">
                        Submit
                    </button>
                </div>

            </form>
        </div>
    </section>

    <!-- section-b -->
    <section id="contact__info" class="text-center py-3 bg-primary">
        <div class="container">
            <div class="info-box">
                <div>
                    <i class="fa-solid fa-envelope fa-2x"></i>
                    <h4>Email</h4>
                    <p>mail@gmail.com</p>
                </div>
                <div>
                    <i class="fa-solid fa-phone fa-2x"></i>
                    <h4>Phone</h4>
                    <p>(+90) 5** ** **</p>
                </div>
                <div>
                    <i class="fa-regular fa-address-card fa-2x"></i>
                    <h4>Address</h4>
                    <p>İstanbul, Türkiye</p>
                </div>
            </div>
        </div>
    </section>

    <!-- footer -->
    <footer id="main-footer" class="bg-black">
        <div class="footer-content container py-1">
            <p>
                &copy; 2026 İsmail Türkoğlu. All rights reserved.
            </p>
            <ul class="social">
                <li><i class="fa-brands fa-facebook"></i></li>
                <li><i class="fa-brands fa-twitter"></i></li>
                <li><i class="fa-brands fa-instagram"></i></li>
                <li><i class="fa-brands fa-youtube"></i></li>
            </ul>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <!-- Jquery -->
    <!-- <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> -->

    <!-- Input - Phone -->
    <script>
        const input = document.getElementById("phone");

        input.addEventListener("input", (e) => {
            let value = e.target.value;

            // sadece rakam
            value = value.replace(/\D/g, '');

            // max 11 hane (TR telefon)
            value = value.substring(0, 11);

            // format: 05xx xxx xx xx
            let formatted = '';

            if (value.length > 0) formatted += value.substring(0, 4);
            if (value.length >= 5) formatted += ' ' + value.substring(4, 7);
            if (value.length >= 8) formatted += ' ' + value.substring(7, 9);
            if (value.length >= 10) formatted += ' ' + value.substring(9, 11);

            e.target.value = formatted;
        });
    </script>

</body>

</html>
